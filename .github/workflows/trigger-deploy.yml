name: Trigger.dev Deploy
# Required secret: TRIGGER_ACCESS_TOKEN
# Set in GitHub repo → Settings → Secrets and variables → Actions → New repository secret
# Token obtained from: Trigger.dev dashboard → Settings → Access Tokens
on:
  push:
    branches: [main]
    paths:
      - 'trigger/**'
jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trigger
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: trigger/package-lock.json
      - run: npm ci
      - name: Validate Trigger deploy secrets
        run: |
          if [ -z "${TRIGGER_ACCESS_TOKEN}" ]; then
            echo "ERROR: Missing TRIGGER_ACCESS_TOKEN repository secret"
            exit 1
          fi
          if [ -z "${TRIGGER_PROJECT_REF}" ]; then
            echo "ERROR: Missing TRIGGER_PROJECT_REF repository secret"
            exit 1
          fi
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
          TRIGGER_PROJECT_REF: ${{ secrets.TRIGGER_PROJECT_REF }}
      - run: npm run deploy -- --env prod
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
          TRIGGER_PROJECT_REF: ${{ secrets.TRIGGER_PROJECT_REF }}
