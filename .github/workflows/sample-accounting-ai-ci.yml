name: Sample Accounting AI CI
on:
  pull_request:
    paths:
      - 'services/sample-accounting-ai/**'
  push:
    branches:
      - main
    paths:
      - 'services/sample-accounting-ai/**'
jobs:
  sample-accounting-ai-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/sample-accounting-ai
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type check (mypy)
        run: uv run mypy src
      - name: Test (pytest)
        run: uv run pytest
